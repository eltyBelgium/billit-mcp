name: Publish DXT bundle

on:
  release:
    types: [published]

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to upload release assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The DXT is a thin launcher: it runs `uvx --from git+...@<tag>` at
      # install time, so uv fetches the right wheels for the user's platform.
      # Nothing to bundle — no compiled deps baked in, fully cross-platform.
      - name: Pack DXT
        run: npx -y @anthropic-ai/dxt pack ./dxt billit-mcp.dxt

      - name: Upload as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" billit-mcp.dxt --clobber
