name: Publish DXT bundle

on:
  release:
    types: [published]

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to upload release assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      # Self-contained Node bundle: esbuild compiles the stdio server (plus
      # its pure-JS deps) into one file. Claude Desktop runs it with its own
      # bundled Node runtime — the user installs nothing.
      - name: Build server bundle
        run: |
          npm run build:dxt
          cp dxt/manifest.json dxt/icon.png dxt/bundle/

      - name: Pack DXT
        run: npx -y @anthropic-ai/dxt pack ./dxt/bundle billit-mcp.dxt

      - name: Upload as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" billit-mcp.dxt --clobber
