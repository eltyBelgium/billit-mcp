name: Deploy Worker

# Auto-deploys the Cloudflare Worker when node/ changes on main.
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — create at dash.cloudflare.com/profile/api-tokens
#                            with the "Edit Cloudflare Workers" template
#   CLOUDFLARE_ACCOUNT_ID  — dash.cloudflare.com → Workers & Pages → account ID
# Without them the job exits early (green) so forks aren't broken.

on:
  push:
    branches: [main]
    paths: ["node/**", ".github/workflows/deploy-worker.yml"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy credentials
        id: creds
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "CLOUDFLARE_API_TOKEN not set — skipping deploy (this is fine on forks)."
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.present == 'true'

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.present == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install deps
        if: steps.creds.outputs.present == 'true'
        working-directory: node
        run: npm ci

      - name: Typecheck
        if: steps.creds.outputs.present == 'true'
        working-directory: node
        run: npx tsc --noEmit

      - name: Deploy
        if: steps.creds.outputs.present == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: node
