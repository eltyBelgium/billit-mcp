name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build stdio entrypoint
        run: npm run build

      - name: MCP handshake smoke test
        run: node scripts/smoke.mjs

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run --outdir /tmp/wrangler-check
