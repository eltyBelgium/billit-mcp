name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # No committed uv.lock — key the cache on pyproject.toml instead of
          # the default **/uv.lock glob (which errors when absent).
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src
        continue-on-error: true   # strict mypy is aspirational; don't block PRs yet

      - name: Pytest
        run: uv run pytest -q
